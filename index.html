*{box-sizing:border-box;margin:0;padding:0;}

.header-name{font-size:0.95rem;font-weight:700;color:#7a50b0;line-height:1.2;}

.header-right{display:flex;gap:6px;align-items:center;}

.status-row{display:flex;align-items:center;gap:8px;margin:4px 0;}

<script>
// ── IndexedDB ──
const DB_NAME='babyTimehouse', DB_VER=1;
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos',{keyPath:'id'});
      if(!d.objectStoreNames.contains('meta')) d.createObjectStore('meta',{keyPath:'key'});
      if(!d.objectStoreNames.contains('milestones')) d.createObjectStore('milestones',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('growth')) d.createObjectStore('growth',{keyPath:'id',autoIncrement:true});
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=()=>rej(req.error);
  });
}
function dbPut(store,val){return new Promise((r,j)=>{const t=db.transaction(store,'readwrite');const req=t.objectStore(store).put(val);req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error);});}
function dbGet(store,key){return new Promise((r,j)=>{const t=db.transaction(store,'readonly');const req=t.objectStore(store).get(key);req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error);});}
function dbGetAll(store){return new Promise((r,j)=>{const t=db.transaction(store,'readonly');const req=t.objectStore(store).getAll();req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error);});}
function dbDelete(store,key){return new Promise((r,j)=>{const t=db.transaction(store,'readwrite');const req=t.objectStore(store).delete(key);req.onsuccess=()=>r();req.onerror=()=>j(req.error);});}
function dbClear(store){return new Promise((r,j)=>{const t=db.transaction(store,'readwrite');const req=t.objectStore(store).clear();req.onsuccess=()=>r();req.onerror=()=>j(req.error);});}

// ── State ──
let babyName='',babyDob=null;
let photos=[],milestones=[],growthLogs=[];
let currentPhotoId=null,selectedPdfStyle='1x1';

async function saveMeta(){
  await dbPut('meta',{key:'babyName',value:babyName});
  await dbPut('meta',{key:'babyDob',value:babyDob?babyDob.toISOString():null});
}
async function loadAll(){
  const n=await dbGet('meta','babyName');
  const d=await dbGet('meta','babyDob');
  if(!n||!n.value) return false;
  babyName=n.value;
  babyDob=d&&d.value?new Date(d.value):null;
  const ps=await dbGetAll('photos');
  photos=ps.map(p=>({...p,date:new Date(p.date)}));
  const ms=await dbGetAll('milestones');
  milestones=ms.map(m=>({...m,date:new Date(m.date)}));
  const gl=await dbGetAll('growth');
  growthLogs=gl.map(g=>({...g,date:new Date(g.date)}));
  return !!babyName&&!!babyDob;
}

// ── Init ──
window.addEventListener('DOMContentLoaded',async()=>{
  await openDB();
  const ok=await loadAll();
  if(ok){
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').style.display='block';
    updateHeader();
    renderUploadGrid();
    renderMilestones();
    renderGrowthLog();
    updateStorageInfo();
  }
});

function getAge(date){
  if(!babyDob) return '';
  const diff=date-babyDob,days=Math.floor(diff/86400000);
  if(days<0) return '';
  const months=Math.floor(days/30.44);
  if(months<1) return days+'天';
  if(months<12) return months+'個月';
  const y=Math.floor(months/12),m=months%12;
  return m>0?y+'歲'+m+'個月':y+'歲';
}
function updateHeader(){
  document.getElementById('h-name').textContent=babyName+'的時光小屋';
  document.getElementById('h-age').textContent='現在 '+(getAge(new Date())||'—');
  document.getElementById('g-months').textContent=babyDob?Math.floor((new Date()-babyDob)/(30.44*86400000)):'—';
}
async function updateStorageInfo(){
  const ps=await dbGetAll('photos');
  const count=ps.length;
  const approx=ps.reduce((s,p)=>s+(p.src?p.src.length:0),0);
  const mb=(approx/1024/1024).toFixed(1);
  document.getElementById('storage-info').innerHTML=`📦 已儲存 ${count} 張照片，約 ${mb} MB（IndexedDB 無上限限制）<div class="storage-fill" style="width:${Math.min(mb/500*100,100)}%"></div>`;
  document.getElementById('photo-count').textContent='('+photos.filter(p=>p.approved).length+'張)';
  document.getElementById('g-photos').textContent=photos.filter(p=>p.approved).length;
}

async function startApp(){
  const n=document.getElementById('setup-name').value.trim();
  const d=document.getElementById('setup-dob').value;
  if(!n||!d){alert('請輸入寶寶名字和生日！');return;}
  babyName=n;babyDob=new Date(d);
  await saveMeta();
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='block';
  updateHeader();
  gtag('event','app_start',{baby_name:n});
}

function switchPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='timeline') renderTimeline();
  if(id==='growth'){updateStorageInfo();}
  gtag('event','page_view',{page:id});
}

// ── Upload ──
async function handleFiles(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  const apiKey=document.getElementById('api-key-input').value.trim();
  const sb=document.getElementById('ai-status-box');sb.style.display='block';
  for(const file of files){
    const id='p_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const src=await readFile(file);
    const photoDate=file.lastModified?new Date(file.lastModified):new Date();
    const row=document.createElement('div');row.className='status-row';
    row.innerHTML=`<div class="dot analyzing" id="dot-${id}"></div><span id="txt-${id}">${file.name} — 分析中…</span>`;
    sb.appendChild(row);
    let approved=false;
    if(apiKey){
      try{
        const base64=src.split(',')[1],mt=file.type||'image/jpeg';
        const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:mt,data:base64}},
              {type:'text',text:'這張照片中有沒有嬰幼兒（0-3歲的寶寶）？請只回答 yes 或 no。'}
            ]}]})});
        const data=await res.json();
        approved=(data.content?.[0]?.text||'').toLowerCase().includes('yes');
      }catch{approved=true;}
    }else{approved=true;}
    const dot=document.getElementById('dot-'+id),txt=document.getElementById('txt-'+id);
    if(approved){
      dot.className='dot pass';txt.textContent=file.name+' — ✅ 寶寶照片！';
      const photo={id,src,date:photoDate.toISOString(),age:getAge(photoDate),tag:'',note:'',approved:true};
      await dbPut('photos',photo);
      photos.push({...photo,date:photoDate});
      renderUploadGrid();
      updateStorageInfo();
      gtag('event','photo_uploaded',{approved:true});
    }else{
      dot.className='dot fail';txt.textContent=file.name+' — ❌ 未偵測到寶寶';
    }
  }
  e.target.value='';
}

function readFile(f){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});}

function renderUploadGrid(){
  const g=document.getElementById('upload-grid');
  const approved=photos.filter(p=>p.approved);
  if(!approved.length){g.innerHTML='<div class="empty-msg" style="grid-column:1/-1"><div class="em-icon">📂</div>上傳照片後會顯示在這裡</div>';return;}
  g.innerHTML='';
  approved.slice().reverse().forEach(p=>{
    const c=document.createElement('div');c.className='photo-card';c.onclick=()=>openModal(p.id);
    c.innerHTML=`<img src="${p.src}" alt="寶寶照片" loading="lazy"><div class="photo-card-info"><div class="photo-card-age">${p.age||'—'}</div><div class="photo-card-date">${new Date(p.date).toLocaleDateString('zh-TW')}</div></div>${p.tag?`<div class="photo-card-tag">${p.tag}</div>`:''}`;
    g.appendChild(c);
  });
}

function renderTimeline(){
  const el=document.getElementById('timeline-content');
  const approved=photos.filter(p=>p.approved).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!approved.length){el.innerHTML='<div class="empty-msg"><div class="em-icon">🕐</div>還沒有照片，趕快去上傳吧！</div>';return;}
  const groups={};
  approved.forEach(p=>{const k=new Date(p.date).toLocaleDateString('zh-TW',{year:'numeric',month:'long'});if(!groups[k])groups[k]=[];groups[k].push(p);});
  el.innerHTML='';
  for(const[month,ps]of Object.entries(groups)){
    const g=document.createElement('div');g.className='month-group';
    g.innerHTML=`<div class="month-label">📅 ${month}</div><div class="photo-grid"></div>`;
    const grid=g.querySelector('.photo-grid');
    ps.forEach(p=>{const c=document.createElement('div');c.className='photo-card';c.onclick=()=>openModal(p.id);c.innerHTML=`<img src="${p.src}" alt="寶寶照片" loading="lazy"><div class="photo-card-info"><div class="photo-card-age">${p.age||'—'}</div><div class="photo-card-date">${new Date(p.date).toLocaleDateString('zh-TW')}</div></div>${p.tag?`<div class="photo-card-tag">${p.tag}</div>`:''}`;grid.appendChild(c);});
    el.appendChild(g);
  }
}

function openModal(id){
  currentPhotoId=id;
  const p=photos.find(x=>x.id===id);
  document.getElementById('modal-img').src=p.src;
  document.getElementById('modal-age').textContent=p.age?'月齡：'+p.age:'';
  document.getElementById('modal-date').textContent=new Date(p.date).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('modal-tag').value=p.tag||'';
  document.getElementById('modal-note').value=p.note||'';
  document.getElementById('photo-modal').classList.add('open');
}
function closeModal(){document.getElementById('photo-modal').classList.remove('open');}
async function savePhotoMeta(){
  const p=photos.find(x=>x.id===currentPhotoId);
  p.tag=document.getElementById('modal-tag').value.trim();
  p.note=document.getElementById('modal-note').value.trim();
  await dbPut('photos',{...p,date:p.date instanceof Date?p.date.toISOString():p.date});
  closeModal();renderUploadGrid();renderTimeline();
}
async function deletePhoto(){
  if(!confirm('確定要刪除這張照片嗎？')) return;
  await dbDelete('photos',currentPhotoId);
  photos=photos.filter(p=>p.id!==currentPhotoId);
  closeModal();renderUploadGrid();renderTimeline();updateStorageInfo();
}

function openMilestoneAdd(){
  document.getElementById('ms-emoji').value='';
  document.getElementById('ms-title').value='';
  document.getElementById('ms-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('milestone-modal').classList.add('open');
}
async function saveMilestone(){
  const em=document.getElementById('ms-emoji').value.trim()||'⭐';
  const t=document.getElementById('ms-title').value.trim();
  const d=document.getElementById('ms-date').value;
  if(!t||!d){alert('請填寫里程碑名稱和日期！');return;}
  const date=new Date(d);
  const obj={emoji:em,title:t,date:date.toISOString(),age:getAge(date)};
  const newId=await dbPut('milestones',obj);
  milestones.push({...obj,id:newId,date});
  milestones.sort((a,b)=>new Date(a.date)-new Date(b.date));
  document.getElementById('milestone-modal').classList.remove('open');
  renderMilestones();
  gtag('event','milestone_added',{title:t});
}
function renderMilestones(){
  const el=document.getElementById('milestone-list');
  if(!milestones.length){el.innerHTML='<div class="empty-msg"><div class="em-icon">⭐</div>記錄寶寶的第一次！</div>';return;}
  el.innerHTML='';
  milestones.forEach(m=>{
    const c=document.createElement('div');c.className='milestone-card';
    c.innerHTML=`<div class="milestone-emoji">${m.emoji}</div><div><div class="milestone-title">${m.title}</div><div class="milestone-date">${new Date(m.date).toLocaleDateString('zh-TW')}${m.age?'・'+m.age:''}</div></div>`;
    el.appendChild(c);
  });
}

async function addGrowthLog(){
  const h=parseFloat(document.getElementById('g-height').value);
  const w=parseFloat(document.getElementById('g-weight').value);
  if(!h&&!w){alert('請輸入身高或體重！');return;}
  const obj={date:new Date().toISOString(),height:h||null,weight:w||null};
  await dbPut('growth',obj);
  growthLogs.push({...obj,date:new Date(obj.date)});
  document.getElementById('g-height').value='';document.getElementById('g-weight').value='';
  renderGrowthLog();
}
function renderGrowthLog(){
  const el=document.getElementById('growth-log');el.innerHTML='';
  growthLogs.slice().reverse().forEach(log=>{
    const c=document.createElement('div');
    c.style.cssText='background:rgba(255,255,255,0.7);border-radius:13px;padding:0.75rem 1rem;border:1.5px solid rgba(180,140,240,0.2);display:flex;justify-content:space-between;align-items:center;';
    c.innerHTML=`<div style="font-size:0.78rem;color:#b0a0cc;">${new Date(log.date).toLocaleDateString('zh-TW')}</div><div style="display:flex;gap:14px;">${log.height?`<span style="color:#9b6dce;font-weight:700;">📏 ${log.height}cm</span>`:''}${log.weight?`<span style="color:#6ba8e0;font-weight:700;">⚖️ ${log.weight}kg</span>`:''}</div>`;
    el.appendChild(c);
  });
  if(!growthLogs.length) el.innerHTML='<div class="empty-msg"><div class="em-icon">📏</div>還沒有記錄</div>';
}

function showSettings(){
  document.getElementById('s-name').value=babyName;
  document.getElementById('s-dob').value=babyDob?babyDob.toISOString().split('T')[0]:'';
  document.getElementById('settings-modal').classList.add('open');
}
async function saveSettings(){
  const n=document.getElementById('s-name').value.trim();
  const d=document.getElementById('s-dob').value;
  if(!n||!d){alert('請填寫完整！');return;}
  babyName=n;babyDob=new Date(d);
  photos.forEach(p=>{p.age=getAge(new Date(p.date));});
  milestones.forEach(m=>{m.age=getAge(new Date(m.date));});
  await saveMeta();
  for(const p of photos) await dbPut('photos',{...p,date:p.date instanceof Date?p.date.toISOString():p.date});
  document.getElementById('settings-modal').classList.remove('open');
  updateHeader();renderUploadGrid();renderTimeline();renderMilestones();
}

// ── PDF ──
function openPdfModal(){
  const approved=photos.filter(p=>p.approved);
  if(!approved.length&&!milestones.length){alert('還沒有照片或里程碑可以匯出！');return;}
  document.getElementById('pdf-modal').classList.add('open');
}
function selectPdfStyle(s){
  selectedPdfStyle=s;
  ['1x1','2x2','timeline','milestone'].forEach(k=>{document.getElementById('ps-'+k).classList.toggle('selected',k===s);});
}
function setProgress(pct,sub,count){
  document.getElementById('pdf-bar').style.width=pct+'%';
  document.getElementById('pdf-sub-text').textContent=sub;
  document.getElementById('pdf-count').textContent=count||'';
}
async function generatePDF(){
  document.getElementById('pdf-modal').classList.remove('open');
  const ov=document.getElementById('pdf-overlay');ov.classList.add('show');
  setProgress(5,'初始化…','');await sleep(100);
  gtag('event','pdf_export',{style:selectedPdfStyle});
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297;
  doc.setFillColor(240,230,255);doc.rect(0,0,W,H,'F');
  doc.setFillColor(230,240,255);doc.ellipse(160,60,80,80,'F');
  doc.setFillColor(255,230,245);doc.ellipse(50,220,60,60,'F');
  doc.setTextColor(130,80,200);doc.setFontSize(28);doc.setFont('helvetica','bold');
  doc.text(babyName+"'s",W/2,110,{align:'center'});
  doc.text('Baby Album',W/2,128,{align:'center'});
  doc.setFontSize(12);doc.setFont('helvetica','normal');doc.setTextColor(160,140,190);
  doc.text('生日：'+(babyDob?babyDob.toLocaleDateString('zh-TW'):'—'),W/2,148,{align:'center'});
  doc.text('月齡：'+getAge(new Date()),W/2,156,{align:'center'});
  doc.setFontSize(8);doc.setTextColor(190,170,210);doc.text('由寶寶時光小屋生成',W/2,280,{align:'center'});
  setProgress(15,'封面完成','');await sleep(50);
  const approved=photos.filter(p=>p.approved).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(selectedPdfStyle==='1x1') await style1x1(doc,approved,W,H);
  else if(selectedPdfStyle==='2x2') await style2x2(doc,approved,W,H);
  else if(selectedPdfStyle==='timeline') await styleTimeline(doc,approved,W,H);
  else await styleMilestone(doc,W,H);
  setProgress(100,'完成！','');await sleep(300);
  ov.classList.remove('show');
  doc.save(babyName+'_成長相冊.pdf');
}
async function style1x1(doc,photos,W,H){
  for(let i=0;i<photos.length;i++){
    const p=photos[i];setProgress(15+Math.round(80*(i+1)/photos.length),'大圖版面…',`${i+1}/${photos.length}`);await sleep(20);
    doc.addPage();doc.setFillColor(250,245,255);doc.rect(0,0,W,H,'F');
    doc.setFillColor(210,185,245);doc.roundedRect(0,0,W,18,0,0,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text(babyName,12,11);doc.text(new Date(p.date).toLocaleDateString('zh-TW'),W-12,11,{align:'right'});
    try{const img=await toBase64Img(p.src,160,160);doc.addImage(img,'JPEG',25,24,160,160);}catch{}
    if(p.age){doc.setFillColor(155,109,206);doc.roundedRect(14,188,50,10,5,5,'F');doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text(p.age,39,194.5,{align:'center'});}
    if(p.tag){doc.setFillColor(230,215,255);doc.roundedRect(70,188,W-84,10,5,5,'F');doc.setTextColor(110,70,180);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(p.tag,W/2,194.5,{align:'center'});}
    if(p.note){doc.setTextColor(140,120,170);doc.setFontSize(9);doc.setFont('helvetica','italic');const lines=doc.splitTextToSize(p.note,W-40);doc.text(lines,W/2,210,{align:'center'});}
    doc.setTextColor(200,185,220);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text((i+1)+'/'+photos.length,W/2,H-6,{align:'center'});
  }
}
async function style2x2(doc,photos,W,H){
  const cols=2,cellW=(W-30)/cols,cellH=(H-30)/cols;
  for(let i=0;i<photos.length;i+=4){
    doc.addPage();doc.setFillColor(248,244,255);doc.rect(0,0,W,H,'F');
    const batch=photos.slice(i,i+4);
    for(let j=0;j<batch.length;j++){
      const p=batch[j];setProgress(15+Math.round(80*(i+j+1)/photos.length),'格狀版面…',`${i+j+1}/${photos.length}`);await sleep(10);
      const col=j%cols,row=Math.floor(j/cols),x=10+col*(cellW+10),y=10+row*(cellH+10);
      doc.setFillColor(255,255,255);doc.roundedRect(x,y,cellW,cellH,6,6,'F');
      try{const img=await toBase64Img(p.src,cellW-4,cellH-18);doc.addImage(img,'JPEG',x+2,y+2,cellW-4,cellH-18);}catch{}
      doc.setTextColor(130,80,200);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.text(p.age||'',x+4,y+cellH-8);
      doc.setTextColor(170,150,195);doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.text(new Date(p.date).toLocaleDateString('zh-TW'),x+cellW-4,y+cellH-8,{align:'right'});
    }
  }
}
async function styleTimeline(doc,photos,W,H){
  const groups={};photos.forEach(p=>{const k=new Date(p.date).toLocaleDateString('zh-TW',{year:'numeric',month:'long'});if(!groups[k])groups[k]=[];groups[k].push(p);});
  let pg=0;const total=Object.keys(groups).length;
  for(const[month,ps]of Object.entries(groups)){
    doc.addPage();pg++;setProgress(15+Math.round(80*pg/total),'時光軸版面…','月份 '+pg+'/'+total);await sleep(20);
    doc.setFillColor(245,240,255);doc.rect(0,0,W,H,'F');
    doc.setFillColor(185,155,240);doc.roundedRect(0,0,W,22,0,0,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text(month,W/2,14,{align:'center'});
    const cols=3,cellW=(W-20)/cols;
    for(let j=0;j<Math.min(ps.length,9);j++){
      const p=ps[j],col=j%cols,row=Math.floor(j/cols),x=10+col*(cellW+5),y=28+row*(cellW+20);
      doc.setFillColor(255,255,255);doc.roundedRect(x,y,cellW,cellW+14,5,5,'F');
      try{const img=await toBase64Img(p.src,cellW-4,cellW-4);doc.addImage(img,'JPEG',x+2,y+2,cellW-4,cellW-4);}catch{}
      doc.setTextColor(130,80,200);doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.text(p.age||'',x+3,y+cellW+8);
    }
  }
}
async function styleMilestone(doc,W,H){
  if(!milestones.length){doc.addPage();doc.setFontSize(14);doc.setTextColor(150,100,200);doc.text('尚無里程碑記錄',W/2,H/2,{align:'center'});return;}
  doc.addPage();doc.setFillColor(255,243,250);doc.rect(0,0,W,H,'F');
  doc.setFillColor(220,180,250);doc.roundedRect(0,0,W,22,0,0,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text(babyName+' 的成長里程碑',W/2,14,{align:'center'});
  let y=32;
  milestones.forEach((m,i)=>{
    setProgress(15+Math.round(80*(i+1)/milestones.length),'里程碑版面…','');
    if(y>H-22){doc.addPage();doc.setFillColor(255,243,250);doc.rect(0,0,W,H,'F');y=16;}
    doc.setFillColor(i%2===0?245:250,235,255);doc.roundedRect(10,y,W-20,20,6,6,'F');
    doc.setFillColor(155,109,206);doc.circle(24,y+10,7,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(m.emoji,24,y+13,{align:'center'});
    doc.setTextColor(90,50,160);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text(m.title,36,y+8);
    doc.setTextColor(160,130,200);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(new Date(m.date).toLocaleDateString('zh-TW')+(m.age?'・'+m.age:''),36,y+16);
    y+=26;
  });
}
function toBase64Img(src,tw,th){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{const c=document.createElement('canvas');c.width=Math.round(tw)*2;c.height=Math.round(th)*2;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.8));};
    img.onerror=()=>rej(new Error('fail'));img.src=src;
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
